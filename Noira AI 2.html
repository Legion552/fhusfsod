<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Noira AI — OnlyFans & OnlyMonster ассистент</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0A0A1A 0%, #1E0B2E 50%, #2D1B3E 100%);
            font-family: 'Inter', sans-serif;
            color: #F0EFFF;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f0ff 0%, #e8ddf8 50%, #ddd0f0 100%);
            color: #1a1a2e;
        }

        body.light-mode .team-card,
        body.light-mode .developers-block,
        body.light-mode .profile-page,
        body.light-mode .subscription-page,
        body.light-mode .settings-page,
        body.light-mode .side-panel,
        body.light-mode .profile-card-block,
        body.light-mode .sub-card-block,
        body.light-mode .settings-card-block {
            background: rgba(255, 250, 255, 0.9);
            color: #1a1a2e;
        }

        body.light-mode .burger-menu,
        body.light-mode .side-panel {
            background: rgba(240, 230, 255, 0.95);
        }

        body.light-mode .menu-item {
            background: rgba(139, 92, 246, 0.1);
        }

        body.light-mode .menu-item:hover {
            background: rgba(139, 92, 246, 0.25);
        }

        body.light-mode .toast-msg {
            background: #2a2448;
            color: #f0efff;
        }

        body.light-mode .setting-row input,
        body.light-mode .setting-row textarea,
        body.light-mode .code-input-page {
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
            border-color: #a855f7;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        @media (min-width: 768px) {
            .container {
                padding: 32px 36px 60px;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #D9B8FF, #A855F7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .logo {
                font-size: 32px;
            }
        }

        body.light-mode .logo {
            background: linear-gradient(135deg, #6b21a5, #a855f7, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .burger-menu {
            background: rgba(30, 20, 50, 0.5);
            backdrop-filter: blur(12px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid rgba(168, 85, 247, 0.4);
        }

        .burger-menu span {
            width: 20px;
            height: 2px;
            background: linear-gradient(90deg, #D9B8FF, #A855F7);
            border-radius: 4px;
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: rgba(12, 8, 24, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(168, 85, 247, 0.4);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 24px 16px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .side-panel.open {
            right: 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(168, 85, 247, 0.3);
        }

        .panel-header h3 {
            font-size: 20px;
            background: linear-gradient(135deg, #E2D6FF, #C084FC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .close-panel {
            font-size: 26px;
            cursor: pointer;
            color: #C084FC;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 50px;
            background: rgba(168, 85, 247, 0.1);
            transition: 0.2s;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            border: 1px solid transparent;
        }

        .menu-item i {
            width: 24px;
            font-size: 18px;
            color: #C084FC;
        }

        .menu-item:hover {
            background: rgba(168, 85, 247, 0.25);
            border-color: rgba(168, 85, 247, 0.5);
            transform: translateX(5px);
        }

        .language-submenu {
            margin-left: 38px;
            margin-top: 8px;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .language-submenu.show {
            display: flex;
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 40px;
            background: rgba(168, 85, 247, 0.05);
            cursor: pointer;
            font-size: 13px;
        }

        .lang-option:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        .lang-option.active {
            background: rgba(168, 85, 247, 0.3);
            border-left: 2px solid #A855F7;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .dynamic-content {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero {
            text-align: center;
            margin: 10px 0 30px;
        }

        .hero h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #D9B8FF, #B87CFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        @media (min-width: 768px) {
            .hero h1 {
                font-size: 42px;
            }
        }

        .hero p {
            font-size: 14px;
            color: #CBC3FF;
            max-width: 500px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .hero p {
                font-size: 17px;
            }
        }

        .team-showcase {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 40px 0 50px;
            flex-wrap: wrap;
        }

        .team-card {
            background: rgba(20, 15, 40, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 20px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(168, 85, 247, 0.4);
        }

        .team-card:hover {
            transform: translateY(-3px);
        }

        .team-icon {
            font-size: 42px;
            margin-bottom: 16px;
            color: #D9B8FF;
        }

        .team-card h3 {
            font-size: 22px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #E9DFFF, #C084FC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .team-card p {
            font-size: 13px;
            line-height: 1.45;
            color: #CBC3FF;
        }

        .team-badge-mini {
            margin-top: 12px;
            font-size: 11px;
            background: rgba(168, 85, 247, 0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 60px;
        }

        .candles-stairs {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            height: 70px;
            margin: 5px 0;
        }

        .candle-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .candle-body-step {
            width: 18px;
            background: linear-gradient(135deg, #A855F7, #D9B8FF);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .candle-wick-step {
            width: 2px;
            background: #D9B8FF;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        .candle-step:nth-child(1) .candle-body-step {
            height: 28px;
        }

        .candle-step:nth-child(1) .candle-wick-step {
            height: 12px;
            bottom: 28px;
        }

        .candle-step:nth-child(2) .candle-body-step {
            height: 42px;
        }

        .candle-step:nth-child(2) .candle-wick-step {
            height: 16px;
            bottom: 42px;
        }

        .candle-step:nth-child(3) .candle-body-step {
            height: 56px;
        }

        .candle-step:nth-child(3) .candle-wick-step {
            height: 20px;
            bottom: 56px;
        }

        .developers-block {
            background: rgba(15, 10, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px;
            margin: 20px 0 30px;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .developers-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .dev-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
            margin: 0 auto;
        }

        .dev-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 20, 50, 0.6);
            padding: 10px 16px;
            border-radius: 60px;
            flex-wrap: wrap;
            gap: 10px;
        }

        @media (min-width: 600px) {
            .dev-item {
                flex-wrap: nowrap;
            }
        }

        .dev-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .dev-info i {
            font-size: 16px;
            color: #C084FC;
        }

        .dev-role {
            font-size: 10px;
            background: rgba(168, 85, 247, 0.2);
            padding: 3px 10px;
            border-radius: 40px;
        }

        .copy-dev {
            background: none;
            border: 1px solid #A855F7;
            color: #D9B8FF;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-dev:hover {
            background: #A855F7;
            color: white;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
        }

        .team-badge {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .team-badge span {
            background: rgba(100, 60, 160, 0.3);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 11px;
        }

        .profile-page,
        .subscription-page,
        .settings-page {
            background: rgba(20, 15, 40, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px;
            margin: 15px 0;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        @media (min-width: 768px) {
            .profile-page,
            .subscription-page,
            .settings-page {
                padding: 40px;
            }
        }

        .profile-grid,
        .sub-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .profile-card-block,
        .sub-card-block {
            flex: 1;
            min-width: 250px;
            background: rgba(30, 20, 55, 0.5);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .profile-card-block h3,
        .sub-card-block h3,
        .settings-card-block h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #D9B8FF;
        }

        .settings-grid-4 {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .settings-grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1100px) {
            .settings-grid-4 {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .settings-card-block {
            background: rgba(30, 20, 55, 0.5);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .setting-row {
            margin-bottom: 14px;
        }

        .setting-row label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .setting-row input,
        .setting-row select,
        .code-input-page {
            width: 100%;
            background: #1F1A40;
            border: 1px solid #7C3AED;
            border-radius: 40px;
            padding: 10px 14px;
            font-size: 13px;
            color: white;
        }

        textarea {
            width: 100%;
            background: #1F1A40;
            border: 1px solid #7C3AED;
            border-radius: 16px;
            padding: 10px;
            font-size: 12px;
            color: white;
        }

        .trigger-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .trigger-tag {
            background: rgba(168, 85, 247, 0.25);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .trigger-tag i {
            cursor: pointer;
            font-size: 10px;
            opacity: 0.7;
        }

        .add-trigger {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .add-trigger input {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            background: #1F1A40;
            border: 1px solid #7C3AED;
            border-radius: 40px;
            color: white;
        }

        .add-trigger button {
            background: linear-gradient(95deg, #7C3AED, #A855F7);
            border: none;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
            font-size: 12px;
        }

        .coming-soon {
            text-align: center;
            padding: 30px 15px;
        }

        .coming-soon i {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .coming-soon p {
            font-size: 13px;
            color: #B9B0E6;
        }

        .save-settings-btn {
            background: linear-gradient(95deg, #7C3AED, #A855F7);
            border: none;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }

        .save-settings-btn:hover {
            transform: scale(0.98);
        }

        .price-big-page {
            font-size: 32px;
            font-weight: 800;
            color: #D9B8FF;
            margin: 10px 0;
        }

        .buy-btn-page,
        .activate-btn-page {
            background: linear-gradient(95deg, #7C3AED, #A855F7);
            border: none;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin: 8px 0;
        }

        .activate-btn-page {
            background: rgba(168, 85, 247, 0.3);
            border: 1px solid #A855F7;
        }

        .timer-page {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin: 12px 0;
            color: #D9B8FF;
        }

        .contacts-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .contact-badge {
            background: rgba(168, 85, 247, 0.15);
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 12px;
        }

        .back-home-btn {
            background: none;
            border: 1px solid #A855F7;
            color: #D9B8FF;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.2s;
            font-size: 13px;
        }

        .back-home-btn:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(168, 85, 247, 0.3);
            transition: 0.3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background: linear-gradient(95deg, #7C3AED, #A855F7);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E1B3A;
            backdrop-filter: blur(16px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1200;
            text-align: center;
            max-width: 90%;
        }

        @media (min-width: 768px) {
            .toast-msg {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="header">
            <div class="logo" id="homeLogoBtn">✦ NOIRA AI</div>
            <div class="burger-menu" id="burgerBtn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div id="dynamicContent" class="dynamic-content"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <h3><span id="menuTitle">Меню</span></h3>
            <div class="close-panel" id="closePanelBtn">&times;</div>
        </div>
        <div class="menu-items">
            <div class="menu-item" data-action="profile"><i class="fas fa-user-circle"></i> <span id="menuProfile">Профиль</span></div>
            <div class="menu-item" data-action="subscription"><i class="fas fa-gem"></i> <span id="menuSubscription">Подписка</span></div>
            <div class="menu-item" data-action="settings"><i class="fas fa-sliders-h"></i> <span id="menuSettings">Настройки</span></div>
            <div class="menu-item" data-action="integration"><i class="fas fa-plug"></i> <span id="menuIntegration">Интеграция</span></div>
            <div class="menu-item" id="languageMenuItem" style="cursor:pointer;">
                <i class="fas fa-globe"></i> <span id="menuLanguage">Language</span> <i class="fas fa-chevron-down" style="margin-left: auto; font-size: 11px;"></i>
            </div>
            <div class="language-submenu" id="languageSubmenu">
                <div class="lang-option" data-lang="ru"><i class="fas fa-flag"></i> Русский</div>
                <div class="lang-option" data-lang="en"><i class="fas fa-flag-usa"></i> English</div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            ru: {
                heroTitle: 'AI ассистент для <br> OnlyFans & OnlyMonster',
                heroDesc: 'Автоответы, генерация контента, аналитика — в бело-фиолетовом стиле',
                team1Title: 'Эксперты в AI', team1Text: 'Мы квалифицированные кодеры и инженеры ИИ. Имеем большой опыт в создании нейросетей для автоматизации контента.', team1Badge: '5+ лет в AI разработке',
                team2Title: 'Опытная команда', team2Text: 'Наша команда — профессионалы с глубокими знаниями в машинном обучении. Мы создаём решения, которые помогают creators масштабировать доход.', team2Badge: '100+ успешных интеграций',

        let currentLang = localStorage.getItem('noira_lang') || 'ru';
        let subscriptionEndDate = localStorage.getItem('noira_sub_end_date') || new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        let currentPage = 'home';
        let isLightTheme = localStorage.getItem('noira_theme') === 'light';
        let triggers = JSON.parse(localStorage.getItem('noira_triggers') || '["скидка", "цена", "стоимость", "купить", "приват"]');

        function applyTheme() {
            if (isLightTheme) document.body.classList.add('light-mode');
            else document.body.classList.remove('light-mode');
        }

        function updateLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('noira_lang', lang);
            const t = translations[lang];
            document.getElementById('menuTitle').innerText = t.menuTitle;
            document.getElementById('menuProfile').innerText = t.menuProfile;
            document.getElementById('menuSubscription').innerText = t.menuSubscription;
            document.getElementById('menuSettings').innerText = t.menuSettings;
            document.getElementById('menuIntegration').innerText = t.menuIntegration;
            document.getElementById('menuLanguage').innerText = t.menuLanguage;
            document.querySelectorAll('.lang-option').forEach(opt => {
                if (opt.getAttribute('data-lang') === currentLang) opt.classList.add('active');
                else opt.classList.remove('active');
            });
            if (currentPage === 'home') renderHome();
            else if (currentPage === 'profile') renderProfile();
            else if (currentPage === 'subscription') renderSubscription();
            else if (currentPage === 'settings') renderSettings();
        }

        function showToast(msg) {
            let t = document.querySelector('.toast-msg');
            if (t) t.remove();
            let toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerHTML = `<i class="fas fa-sparkle"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        function setupCopy() {
            document.querySelectorAll('.copy-dev').forEach(btn => {
                btn.removeEventListener('click', copyHandler);
                btn.addEventListener('click', copyHandler);
            });
        }
        function copyHandler(e) {
            let contact = e.currentTarget.getAttribute('data-contact');
            if (contact) {
                navigator.clipboard.writeText(contact);
                showToast(translations[currentLang].toastCopied.replace('{contact}', contact));
            }
        }

        function updateTimerDisplay() {
            const timerElement = document.getElementById('timerDisplayPage');
            if (!timerElement) return;
            const end = new Date(subscriptionEndDate);
            const now = new Date();
            const diff = end - now;
            if (diff <= 0) {
                timerElement.innerHTML = currentLang === 'ru' ? 'Подписка истекла' : 'Subscription expired';
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (86400000)) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            timerElement.innerHTML = `${days}д ${hours}ч ${mins}м`;
        }

        function activateSubscription(code) {
            if (code === 'PREMIUM2025' || code === 'NOIRA800') {
                const newDate = new Date();
                newDate.setMonth(newDate.getMonth() + 1);
                subscriptionEndDate = newDate.toISOString().split('T')[0];
                localStorage.setItem('noira_sub_end_date', subscriptionEndDate);
                localStorage.setItem('noira_sub_plan', 'Premium');
                showToast(translations[currentLang].toastCodeActivated.replace('{date}', subscriptionEndDate));
                if (currentPage === 'profile') renderProfile();
                else if (currentPage === 'subscription') renderSubscription();
                return true;
            }
            return false;
        }

        function renderHome() {
            const t = translations[currentLang];
            const html = `
                <div class="hero"><h1>${t.heroTitle}</h1><p>${t.heroDesc}</p></div>
                <div class="team-showcase">
                    <div class="team-card"><div class="team-icon"><i class="fas fa-brain"></i></div><h3>${t.team1Title}</h3><p>${t.team1Text}</p><div class="team-badge-mini"><i class="fas fa-code"></i> ${t.team1Badge}</div></div>
                    <div class="team-card"><div class="team-icon"><div class="candles-stairs"><div class="candle-step"><div class="candle-body-step"></div><div class="candle-wick-step"></div></div><div class="candle-step"><div class="candle-body-step"></div><div class="candle-wick-step"></div></div><div class="candle-step"><div class="candle-body-step"></div><div class="candle-wick-step"></div></div></div></div><h3>${t.team2Title}</h3><p>${t.team2Text}</p><div class="team-badge-mini"><i class="fas fa-chart-line"></i> ${t.team2Badge}</div></div>
                </div>
                <div class="developers-block"><div class="developers-title"><i class="fas fa-code-branch"></i> ${t.devTitle}</div><div class="dev-list">
                    <div class="dev-item"><div class="dev-info"><i class="fab fa-telegram"></i><span><strong>@SaleBlackBox</strong></span><span class="dev-role">${t.ceoRole}</span></div><button class="copy-dev" data-contact="@SaleBlackBox">${currentLang === 'ru' ? 'Копировать' : 'Copy'}</button></div>
                    <div class="dev-item"><div class="dev-info"><i class="fas fa-laptop-code"></i><span><strong>@nokristal</strong></span><span class="dev-role">${t.seniorRole}</span></div><button class="copy-dev" data-contact="@nokristal">${currentLang === 'ru' ? 'Копировать' : 'Copy'}</button></div>
                    <div class="dev-item"><div class="dev-info"><i class="fas fa-code"></i><span><strong>@wxzris</strong></span><span class="dev-role">${t.jrRole}</span></div><button class="copy-dev" data-contact="@wxzris">${currentLang === 'ru' ? 'Копировать' : 'Copy'}</button></div>
                </div></div>
                <div class="footer"><div class="team-badge"><span><i class="fas fa-users"></i> ${t.footer1}</span><span><i class="fas fa-chart-line"></i> ${t.footer2}</span></div><div style="font-size:12px; opacity:0.7;">${t.footerText}</div></div>
            `;
            document.getElementById('dynamicContent').innerHTML = html;
            setupCopy();
        }

        function renderProfile() {
            const t = translations[currentLang];
            const subPlan = localStorage.getItem('noira_sub_plan') || 'Базовый';
            const planText = subPlan === 'Базовый' ? t.planBasic : t.planPremium;
            const html = `<button class="back-home-btn" id="backHomeBtn"><i class="fas fa-arrow-left"></i> ${t.backToHome}</button>
                <div class="profile-page"><div class="profile-grid">
                    <div class="profile-card-block"><h3><i class="fas fa-microchip"></i> ${t.currentModel}</h3><div style="font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #E9DFFF, #C084FC); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 10px;">${t.modelName}</div><p style="margin-bottom: 16px;">${t.modelDesc}</p><div style="background: rgba(168,85,247,0.2); display: inline-block; padding: 4px 12px; border-radius: 60px; font-size: 11px;"><i class="fas fa-check-circle"></i> ${t.modelActive}</div></div>
                    <div class="profile-card-block"><h3><i class="fas fa-crown"></i> ${t.subscriptionInfo}</h3><div style="background: rgba(168,85,247,0.15); border-radius: 20px; padding: 16px;"><div style="font-size: 20px; font-weight: 700; color: #D9B8FF; margin-bottom: 8px;">${planText}</div><div style="font-size: 13px;">${t.expiryLabel} <span style="color: #A855F7; font-weight: 600;">${subscriptionEndDate}</span></div></div><div style="margin-top: 16px; font-size: 12px;"><i class="fas fa-info-circle"></i> ${currentLang === 'ru' ? 'Для расширения функций перейдите в раздел «Подписка»' : 'To upgrade go to Subscription'}</div></div>
                </div><div class="contacts-row"><div class="contact-badge"><i class="fab fa-telegram"></i> @SaleBlackBox</div><div class="contact-badge"><i class="fab fa-telegram"></i> @nokristal</div><div class="contact-badge"><i class="fab fa-telegram"></i> @wxzris</div></div></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            document.getElementById('backHomeBtn').addEventListener('click', () => { currentPage = 'home'; renderHome(); });
        }

        function renderSubscription() {
            const t = translations[currentLang];
            const html = `<button class="back-home-btn" id="backHomeBtnSub"><i class="fas fa-arrow-left"></i> ${t.backToHome}</button>
                <div class="subscription-page"><div class="sub-grid">
                    <div class="sub-card-block"><h3><i class="fas fa-dollar-sign"></i> ${t.subscriptionPageTitle}</h3><div class="price-big-page">${t.priceLabel}</div><p style="margin: 8px 0;">${t.premiumDesc}</p><button class="buy-btn-page" id="buySubBtn"><i class="fab fa-telegram"></i> ${t.buyContact}</button><div style="font-size: 11px; margin-top: 8px;">${currentLang === 'ru' ? 'После оплаты вы получите код активации' : 'After payment you will receive an activation code'}</div></div>
                    <div class="sub-card-block"><h3><i class="fas fa-key"></i> ${t.activationTitle}</h3><input type="text" id="activationCodeInputPage" class="code-input-page" placeholder="${t.codePlaceholder}"><button class="activate-btn-page" id="activateCodeBtnPage">${t.activateBtn}</button><div class="timer-page" id="timerDisplayPage">--</div><div style="font-size: 11px; text-align: center;">${t.currentTimer}</div></div>
                </div><div class="contacts-row"><div class="contact-badge"><i class="fab fa-telegram"></i> @SaleBlackBox</div><div class="contact-badge"><i class="fab fa-telegram"></i> @nokristal</div><div class="contact-badge"><i class="fab fa-telegram"></i> @wxzris</div></div></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            updateTimerDisplay();
            const timerInterval = setInterval(() => { if (currentPage === 'subscription') updateTimerDisplay(); else clearInterval(timerInterval); }, 1000);
            document.getElementById('backHomeBtnSub').addEventListener('click', () => { currentPage = 'home'; renderHome(); clearInterval(timerInterval); });
            document.getElementById('buySubBtn').addEventListener('click', () => { window.open('https://t.me/SaleBlackBox', '_blank'); });
            document.getElementById('activateCodeBtnPage').addEventListener('click', () => {
                const code = document.getElementById('activationCodeInputPage').value.trim();
                if (activateSubscription(code)) {
                    document.getElementById('activationCodeInputPage').value = '';
                    updateTimerDisplay();
                } else showToast(translations[currentLang].toastInvalidCode);
            });
        }

        function renderSettings() {
            const t = translations[currentLang];
            const savedTheme = localStorage.getItem('noira_theme') === 'light';
            const savedNotifications = localStorage.getItem('noira_notifications') !== 'false';
            const aiName = localStorage.getItem('noira_ai_name') || 'Noira';
            const aiVoice = localStorage.getItem('noira_ai_voice') || 'Нежный';
            const ppvPrice = localStorage.getItem('noira_ppv_price') || '25';
            const ppvMessage = localStorage.getItem('noira_ppv_message') || '🔥 Эксклюзивный контент всего за {price}$! Напиши мне для покупки.';
            const triggerListHtml = triggers.map(tr => `<span class="trigger-tag">${tr} <i class="fas fa-times remove-trigger" data-trigger="${tr}" style="cursor:pointer;"></i></span>`).join('');
            const html = `<button class="back-home-btn" id="backHomeBtnSettings"><i class="fas fa-arrow-left"></i> ${t.backToHome}</button>
                <div class="settings-page"><div class="settings-grid-4">
                    <div class="settings-card-block"><h3><i class="fas fa-user-edit"></i> ${t.personalization}</h3>
                        <div class="setting-row"><label>${t.themeLabel}</label><label class="switch" style="display: inline-block; margin-left: 10px;"><input type="checkbox" id="themeToggle" ${savedTheme ? 'checked' : ''}><span class="slider"></span></label></div>
                        <div class="setting-row"><label>${t.notificationsLabel}</label><label class="switch" style="display: inline-block; margin-left: 10px;"><input type="checkbox" id="notificationsToggle" ${savedNotifications ? 'checked' : ''}><span class="slider"></span></label></div>
                        <div class="setting-row"><label>${t.aiNameLabel}</label><input type="text" id="aiNameInput" value="${aiName}"></div>
                        <div class="setting-row"><label>${t.aiVoiceLabel}</label><select id="aiVoiceSelect"><option value="Нежный" ${aiVoice === 'Нежный' ? 'selected' : ''}>Нежный</option><option value="Энергичный" ${aiVoice === 'Энергичный' ? 'selected' : ''}>Энергичный</option><option value="Деловой" ${aiVoice === 'Деловой' ? 'selected' : ''}>Деловой</option></select></div>
                    </div>
                    <div class="settings-card-block"><h3><i class="fas fa-key"></i> ${t.keyWordsTitle}</h3><div class="trigger-list" id="triggerList">${triggerListHtml}</div><div class="add-trigger"><input type="text" id="newTriggerInput" placeholder="${t.triggerPlaceholder}"><button id="addTriggerBtn">${t.addTrigger}</button></div></div>
                    <div class="settings-card-block"><h3><i class="fas fa-lock"></i> ${t.ppvTitle}</h3><div class="setting-row"><label>${t.ppvPriceLabel}</label><input type="number" id="ppvPriceInput" value="${ppvPrice}" step="1"></div><div class="setting-row"><label>${t.ppvMessageLabel}</label><textarea id="ppvMessageInput" rows="3">${ppvMessage}</textarea></div></div>
                    <div class="settings-card-block"><h3><i class="fas fa-clock"></i> ${t.soonTitle}</h3><div class="coming-soon"><i class="fas fa-rocket"></i><p>${t.soonText}</p></div></div>
                </div><button class="save-settings-btn" id="saveSettingsBtn">${t.saveSettings}</button><div class="contacts-row"><div class="contact-badge"><i class="fab fa-telegram"></i> @SaleBlackBox</div><div class="contact-badge"><i class="fab fa-telegram"></i> @nokristal</div><div class="contact-badge"><i class="fab fa-telegram"></i> @wxzris</div></div></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            document.getElementById('backHomeBtnSettings').addEventListener('click', () => { currentPage = 'home'; renderHome(); });
            document.querySelectorAll('.remove-trigger').forEach(btn => {
                btn.addEventListener('click', (e) => { const trigger = btn.getAttribute('data-trigger'); triggers = triggers.filter(t => t !== trigger); localStorage.setItem('noira_triggers', JSON.stringify(triggers)); renderSettings(); });
            });
            document.getElementById('addTriggerBtn').addEventListener('click', () => { const newTrigger = document.getElementById('newTriggerInput').value.trim(); if (newTrigger && !triggers.includes(newTrigger)) { triggers.push(newTrigger); localStorage.setItem('noira_triggers', JSON.stringify(triggers)); renderSettings(); } });
            document.getElementById('saveSettingsBtn').addEventListener('click', () => {
                const themeOn = document.getElementById('themeToggle').checked;
                const notifOn = document.getElementById('notificationsToggle').checked;
                localStorage.setItem('noira_theme', themeOn ? 'light' : 'dark');
                localStorage.setItem('noira_notifications', notifOn);
                localStorage.setItem('noira_ai_name', document.getElementById('aiNameInput').value);
                localStorage.setItem('noira_ai_voice', document.getElementById('aiVoiceSelect').value);
                localStorage.setItem('noira_ppv_price', document.getElementById('ppvPriceInput').value);
                localStorage.setItem('noira_ppv_message', document.getElementById('ppvMessageInput').value);
                isLightTheme = themeOn;
                applyTheme();
                showToast(translations[currentLang].toastSettings);
            });
        }

        const burger = document.getElementById('burgerBtn');
        const sidePanel = document.getElementById('sidePanel');
        const overlay = document.getElementById('overlay');
        const closePanelBtn = document.getElementById('closePanelBtn');
        function openPanel() { sidePanel.classList.add('open'); overlay.classList.add('active'); }
        function closePanel() { sidePanel.classList.remove('open'); overlay.classList.remove('active'); }
        burger.addEventListener('click', openPanel);
        closePanelBtn.addEventListener('click', closePanel);
        overlay.addEventListener('click', closePanel);

        const languageMenuItem = document.getElementById('languageMenuItem');
        const languageSubmenu = document.getElementById('languageSubmenu');
        let langSubmenuOpen = false;
        languageMenuItem.addEventListener('click', (e) => {
            e.stopPropagation();
            langSubmenuOpen = !langSubmenuOpen;
            if (langSubmenuOpen) languageSubmenu.classList.add('show');
            else languageSubmenu.classList.remove('show');
        });
        document.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', () => {
                updateLanguage(opt.getAttribute('data-lang'));
                languageSubmenu.classList.remove('show');
                langSubmenuOpen = false;
            });
        });

        function handleMenuAction(action) {
            closePanel();
            const t = translations[currentLang];
            switch (action) {
                case 'profile': currentPage = 'profile'; renderProfile(); break;
                case 'subscription': currentPage = 'subscription'; renderSubscription(); break;
                case 'settings': currentPage = 'settings'; renderSettings(); break;
                case 'integration': showToast(t.toastIntegration); break;
            }
        }
        document.querySelectorAll('.menu-item[data-action]').forEach(item => {
            item.addEventListener('click', () => handleMenuAction(item.getAttribute('data-action')));
        });
        document.getElementById('homeLogoBtn').addEventListener('click', () => { currentPage = 'home'; renderHome(); closePanel(); });

        function init() {
            applyTheme();
            updateLanguage(currentLang);
            if (!localStorage.getItem('noira_sub_end_date')) localStorage.setItem('noira_sub_end_date', subscriptionEndDate);
            if (!localStorage.getItem('noira_sub_plan')) localStorage.setItem('noira_sub_plan', 'Базовый');
            if (!localStorage.getItem('noira_notifications')) localStorage.setItem('noira_notifications', 'true');
            if (!localStorage.getItem('noira_triggers')) localStorage.setItem('noira_triggers', JSON.stringify(triggers));
            renderHome();
        }
        init();
    </script>
